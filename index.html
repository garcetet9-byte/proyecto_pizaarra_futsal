<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Futsal 3D Elite Tactical Board</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
 
  <div id="ui">
     <select id="teamSelect">
  <option value="A">Equipo A</option>
  <option value="B">Equipo B</option>

</select>
<select id="arrowType">
  <option value="straight">Flecha Recta</option>
  <option value="curveLeft">Curva Izquierda</option>
  <option value="curveRight">Curva Derecha</option>
</select>
    <button onclick="addPlayer()">Jugador</button>
    <button onclick="addGoalkeeper()">Arquero</button>
    <button onclick="addArrow()">Flecha</button>
    <button onclick="deleteSelected()">Borrar</button>
    <button onclick="savePlay()">Guardar</button>
    <button onclick="loadPlay()">Cargar</button>
    <button onclick="animatePlay()">Animar</button>
    <button id="btnScreenRec" onclick="toggleScreenRecord()">Grabar</button>
  </div>

  <canvas id="scene"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
